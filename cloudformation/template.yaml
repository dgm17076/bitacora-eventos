AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infraestructura para el Sistema de Bitácora de Eventos.
  Crea una instancia EC2 para correr la aplicación con Docker
  y un bucket S3 para almacenar los logs generados.

Parameters:

  NombreProyecto:
    Type: String
    Default: bitacora-eventos
    Description: Nombre base del proyecto

  TipoInstancia:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    Description: Tipo de instancia EC2

  AMIId:
    Type: String
    Default: ami-0c02fb55956c7d316
    Description: AMI de Amazon Linux 2 (us-east-1)

  PuertoFrontend:
    Type: Number
    Default: 5173
    Description: Puerto del frontend

  PuertoBackend:
    Type: Number
    Default: 3000
    Description: Puerto del backend

Resources:

  # ---------------------------------------------------------------------------
  # SECURITY GROUP
  #
  # NOTA IMPORTANTE: Este SG usa 0.0.0.0/0 solo para desarrollo/pruebas.
  # En PRODUCCION se deben aplicar estas restricciones:
  #
  # - SSH (22): Usar solo tu IP especifica (X.X.X.X/32), nunca 0.0.0.0/0
  # - Backend (3000): No exponer a internet. Solo acceso interno desde el SG.
  # - Base de datos (3306/27017): NUNCA exponer. Solo acceso local en Docker.
  # - Frontend (5173): En produccion usar puerto 443 con HTTPS y Load Balancer.
  # - Usar 0.0.0.0/0 en produccion es un riesgo de seguridad critico.
  # ---------------------------------------------------------------------------

  BitacoraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${NombreProyecto}-sg'
      GroupDescription: SG para Bitacora de Eventos - solo desarrollo
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (restringir en produccion)
        - IpProtocol: tcp
          FromPort: !Ref PuertoFrontend
          ToPort: !Ref PuertoFrontend
          CidrIp: 0.0.0.0/0
          Description: Frontend React/Vite
        - IpProtocol: tcp
          FromPort: !Ref PuertoBackend
          ToPort: !Ref PuertoBackend
          CidrIp: 0.0.0.0/0
          Description: Backend API (restringir en produccion)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
      Tags:
        - Key: Name
          Value: !Sub '${NombreProyecto}-sg'

  # ---------------------------------------------------------------------------
  # INSTANCIA EC2
  # ---------------------------------------------------------------------------

  BitacoraEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref TipoInstancia
      ImageId: !Ref AMIId
      SecurityGroups:
        - !Ref BitacoraSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${NombreProyecto}-server'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y git
          amazon-linux-extras install docker -y
          service docker start
          usermod -a -G docker ec2-user
          chkconfig docker on
          curl -Lo /usr/local/bin/docker-compose \
            https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64
          chmod +x /usr/local/bin/docker-compose
          cd /home/ec2-user
          git clone https://github.com/dgm17076/bitacora-eventos.git
          cd bitacora-eventos
          chmod +x deploy.sh start_app.sh stop_app.sh
          ./deploy.sh
          (crontab -l 2>/dev/null; echo "0 8 * * * /home/ec2-user/bitacora-eventos/start_app.sh") | crontab -
          (crontab -l 2>/dev/null; echo "0 22 * * * /home/ec2-user/bitacora-eventos/stop_app.sh") | crontab -

  BitacoraEIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref BitacoraEC2
      Tags:
        - Key: Name
          Value: !Sub '${NombreProyecto}-eip'

  # ---------------------------------------------------------------------------
  # BUCKET S3 — logs de la aplicacion
  # ---------------------------------------------------------------------------

  BitacoraLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${NombreProyecto}-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: EliminarLogsAntiguos
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Name
          Value: !Sub '${NombreProyecto}-logs'

Outputs:

  URLAplicacion:
    Description: URL del sistema de Bitacora
    Value: !Sub 'http://${BitacoraEIP}:5173'

  IPPublica:
    Description: IP publica de la instancia EC2
    Value: !Ref BitacoraEIP

  SSHConexion:
    Description: Comando para conectarse por SSH
    Value: !Sub 'ssh -i tu-key.pem ec2-user@${BitacoraEIP}'

  NombreBucketS3:
    Description: Bucket S3 para logs
    Value: !Ref BitacoraLogsBucket

  IDInstanciaEC2:
    Description: ID de la instancia EC2
    Value: !Ref BitacoraEC2
