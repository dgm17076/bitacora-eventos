version: '3.9'

services:

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: bitacora-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: bitacora
    volumes:
      - mongo_data:/data/db
    networks:
      - bitacora-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Backend (Node.js / Express) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bitacora-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/bitacora
      NODE_ENV: production
      FRONTEND_URL: http://localhost:80
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-bitacora-logs-bucket}
    volumes:
      - app_logs:/app/logs
    depends_on:
      mongo:
        condition: service_started
    networks:
      - bitacora-net
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ─── Frontend (React + Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bitacora-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - bitacora-net

volumes:
  mongo_data:
  app_logs:

networks:
  bitacora-net:
    driver: bridge
